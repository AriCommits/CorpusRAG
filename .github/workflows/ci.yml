name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Run ruff linter
        run: ruff check src/ tests/

      - name: Run ruff formatter check
        run: ruff format --check src/ tests/

      - name: Run mypy type checker
        run: mypy src/corpus_callosum --ignore-missing-imports

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Create test config
        run: |
          cp configs/corpus_callosum.yaml.example configs/corpus_callosum.yaml

      - name: Run tests
        run: |
          PYTHONPATH=src pytest tests/ -v --cov=src/corpus_callosum --cov-report=xml --ignore=tests/test_smoke.py
        env:
          CORPUS_CALLOSUM_CONFIG: configs/corpus_callosum.yaml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .docker/Dockerfile
          push: false
          tags: corpus-callosum:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-compose-test:
    name: Docker Compose Test
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Create docker config
        run: |
          cp configs/corpus_callosum.docker.yaml.example configs/corpus_callosum.docker.yaml

      - name: Start services
        run: |
          docker compose -f .docker/docker-compose.yml up -d --build
        timeout-minutes: 5

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to start..."
          sleep 30
          
          # Check ChromaDB health
          for i in {1..10}; do
            if curl -f http://localhost:8000/api/v1/heartbeat; then
              echo "ChromaDB is healthy"
              break
            fi
            echo "Waiting for ChromaDB... ($i/10)"
            sleep 5
          done
          
          # Check API health
          for i in {1..10}; do
            if curl -f http://localhost:8080/health; then
              echo "API is healthy"
              break
            fi
            echo "Waiting for API... ($i/10)"
            sleep 5
          done

      - name: Test health endpoint
        run: |
          response=$(curl -s http://localhost:8080/health)
          echo "Health response: $response"
          echo "$response" | grep -q '"status":"ok"'

      - name: Test collections endpoint
        run: |
          response=$(curl -s http://localhost:8080/collections)
          echo "Collections response: $response"
          echo "$response" | grep -q '"collections"'

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose -f .docker/docker-compose.yml logs

      - name: Stop services
        if: always()
        run: |
          docker compose -f .docker/docker-compose.yml down -v
