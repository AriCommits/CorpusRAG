#   # Configure and run
#   corpus --config my-config.yaml rag ingest ./vault --collection notes
#   corpus rag query "What is ML?" --collection notes --tag python
#
#   # Video to notes pipeline
#   corpus orchestrate lecture-pipeline ./lecture.mp4 --course CS101 --lecture 1
#
#   # Generate study materials
#   corpus orchestrate study-session --collection notes --topic algorithms
#
#   # Code quality
#   python scripts/lint_and_format.py --fix --test
#
# For detailed documentation, see:
#   - README.md - Quick start and feature overview
#   - LINT_AND_FORMAT.md - Code quality and development
