llm:
  endpoint: http://localhost:11434
  model: gemma4:26b-a4b-it-q4_K_M
  backend: ollama
  timeout_seconds: 120.0
  temperature: 0.7
  max_tokens: null
  api_key: null
  fallback_models: []

embedding:
  backend: ollama
  model: embeddinggemma:latest       
  dimensions: null

database:
  backend: chromadb
  mode: persistent
  host: localhost
  port: 8000
  persist_directory: ./chroma_store

paths:
  vault: ./vault
  scratch_dir: ./scratch
  output_dir: ./output

rag:
  chunking:
    size: 100
    overlap: 20
  retrieval:
    top_k_semantic: 10
    top_k_bm25: 10
    top_k_final: 5
    rrf_k: 60
  collection_prefix: rag
