llm:
  endpoint: http://localhost:11434
  model: gemma4:26b-a4b-it-q4_K_M
  backend: ollama
  timeout_seconds: 120.0
  temperature: 0.7
  max_tokens: null
  api_key: null
  fallback_models: []

embedding:
  backend: ollama
  model: embeddinggemma       
  dimensions: null

database:
  backend: chromadb
  mode: persistent
  host: localhost
  port: 8000
  persist_directory: ./chroma_store

paths:
  vault: ./vault
  scratch_dir: ./scratch
  output_dir: ./output

rag:
  chunking:
    size: 1000
    overlap: 200
  retrieval:
    top_k_semantic: 25
    top_k_bm25: 25
    top_k_final: 10
    rrf_k: 80
  collection_prefix: rag


video:
  models_dir: ../../Models
  whisper_model: "large-v2"
  whisper_device: "cuda"
  # whisper_compute_type: "int8"
  #
  clean_model: "gemma4:26b-a4b-it-q4_K_M"