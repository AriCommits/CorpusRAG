llm:
  backend: ollama
  endpoint: http://localhost:11434
  model: gemma4:26b-a4b-it-q4_K_M
  timeout_seconds: 120.0
  temperature: 0.7
  max_tokens: null
  api_key: null
  fallback_models: []
  rate_limit_rpm: null
  rate_limit_concurrent: null
embedding:
  backend: ollama
  model: embeddinggemma
  dimensions: null
database:
  backend: chromadb
  mode: http
  host: localhost
  port: 8001
  persist_directory: ./chroma_store
paths:
  vault: C:/Users/arian/Downloads/Obsidian_Notes
  scratch_dir: ./scratch
  output_dir: ./output
rag:
  strategy: hybrid
  chunking:
    child_chunk_size: 400
    child_chunk_overlap: 50
    adaptive: true
  retrieval:
    top_k_semantic: 50
    top_k_bm25: 50
    top_k_final: 25
    rrf_k: 80
  parent_store:
    type: local_file
    path: ./parent_store
  collection_prefix: rag
telemetry:
  enabled: false
