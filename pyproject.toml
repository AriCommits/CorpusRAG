[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "corpus-callosum"
version = "0.1.0"
description = "Collection-scoped local RAG service with hybrid retrieval"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.116.0",
  "uvicorn>=0.35.0",
  "chromadb>=1.0.20",
  "sentence-transformers>=3.0.0",
  "rank-bm25>=0.2.2",
  "httpx>=0.27.0",
  "python-dotenv>=1.0.1",
  "pyyaml>=6.0.2",
  "pypdf>=5.1.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[project.scripts]
corpus-api = "corpus_callosum.api:main"
corpus-ingest = "corpus_callosum.ingest:main"
