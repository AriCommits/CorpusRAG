# Development override
# Usage: docker compose -f .docker/docker-compose.yml -f .docker/docker-compose.dev.yml up

services:
  corpus-mcp:
    build:
      target: development
    environment:
      - CORPUSRAG_LOG_LEVEL=DEBUG
    volumes:
      - ../src:/home/corpus/app/src:ro
      - ../pyproject.toml:/home/corpus/app/pyproject.toml:ro
      - ../tests:/home/corpus/app/tests:ro
    command: >
      bash -c "
        pip install --user -e ./app &&
        corpus-mcp-server --profile full --transport streamable-http --host 0.0.0.0 --port 8000 --no-auth
      "

  corpus-cli:
    build:
      target: development
    volumes:
      - ../src:/home/corpus/app/src:rw
      - ../tests:/home/corpus/app/tests:rw
      - ../pyproject.toml:/home/corpus/app/pyproject.toml:ro
    environment:
      - CORPUSRAG_LOG_LEVEL=DEBUG
