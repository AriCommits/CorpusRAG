services:
  chroma:
    image: chromadb/chroma:latest
    container_name: corpus-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  corpus_api:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
    container_name: corpus-api
    restart: unless-stopped
    depends_on:
      chroma:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - CORPUS_CALLOSUM_CONFIG=/app/configs/corpus_callosum.docker.yaml
      - PYTHONPATH=/app/src
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../configs:/app/configs:ro
      - ../vault:/app/vault
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  chroma_data:
