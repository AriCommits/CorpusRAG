services:
  chroma:
    image: chromadb/chroma:latest
    container_name: corpus-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  corpus_api:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
    container_name: corpus-api
    restart: unless-stopped
    depends_on:
      chroma:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - CORPUS_CALLOSUM_CONFIG=/app/configs/corpus_callosum.docker.yaml
      - PYTHONPATH=/app/src
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=corpus-callosum
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../configs:/app/configs:ro
      - ../vault:/app/vault
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: observability-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=otel
      - POSTGRES_PASSWORD=otel_password
      - POSTGRES_DB=otel_traces
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otel"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  chroma_data:
  postgres_data:
