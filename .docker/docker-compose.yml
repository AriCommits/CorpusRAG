# CorpusRAG Docker Compose
#
# Usage:
#   docker compose -f .docker/docker-compose.yml up                    # ChromaDB + MCP server
#   docker compose -f .docker/docker-compose.yml --profile ollama up   # + local LLM
#   docker compose -f .docker/docker-compose.yml --profile cli up      # + CLI container
#   docker compose -f .docker/docker-compose.yml --profile full up     # Everything

networks:
  corpus-network:
    driver: bridge

volumes:
  corpus-data:
  chroma-data:
  ollama-data:

services:
  # ---------------------------------------------------------------------------
  # ChromaDB — Vector Database
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: corpus-chromadb
    restart: unless-stopped
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_PORT=8000
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - corpus-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # CorpusRAG MCP Server
  # ---------------------------------------------------------------------------
  corpus-mcp:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
      target: production
    container_name: corpus-mcp-server
    restart: unless-stopped
    depends_on:
      chromadb:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - corpus-data:/home/corpus/data
      - ../configs:/home/corpus/app/configs:ro
    networks:
      - corpus-network
    environment:
      - CORPUSRAG_DATABASE_BACKEND=chromadb
      - CORPUSRAG_DATABASE_MODE=http
      - CORPUSRAG_DATABASE_HOST=chromadb
      - CORPUSRAG_DATABASE_PORT=8000
      - CORPUSRAG_LLM_ENDPOINT=http://ollama:11434
      - CORPUSRAG_LLM_MODEL=llama3
    healthcheck:
      test: ["CMD", "python", "/home/corpus/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Ollama — Local LLM (optional)
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: corpus-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - corpus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - ollama
      - full

  # ---------------------------------------------------------------------------
  # CLI container (optional)
  # ---------------------------------------------------------------------------
  corpus-cli:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
      target: cli
    container_name: corpus-cli
    depends_on:
      chromadb:
        condition: service_healthy
    volumes:
      - corpus-data:/home/corpus/data
      - ../configs:/home/corpus/app/configs:ro
    networks:
      - corpus-network
    environment:
      - CORPUSRAG_DATABASE_BACKEND=chromadb
      - CORPUSRAG_DATABASE_MODE=http
      - CORPUSRAG_DATABASE_HOST=chromadb
      - CORPUSRAG_DATABASE_PORT=8000
      - CORPUSRAG_LLM_ENDPOINT=http://ollama:11434
      - CORPUSRAG_LLM_MODEL=llama3
    profiles:
      - cli
      - full
    stdin_open: true
    tty: true
