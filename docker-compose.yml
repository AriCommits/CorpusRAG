# Minimal Docker Compose for local development
# Spins up ChromaDB for RAG vector storage
#
# Usage: docker compose up -d
# Check health: curl http://localhost:8000/api/v1/heartbeat

version: '3.8'

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: corpus-chromadb-local
    restart: unless-stopped
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_PORT=8000
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  chroma-data:
    driver: local
